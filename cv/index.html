<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Manuel Martinez Garcia</title>
    <meta name="description" content="Resume of Manuel Martinez Garcia, UC Berkeley IEOR student with experience in transportation engineering, operations research, data analysis, and research." />
    <meta name="author" content="Manuel Martinez Garcia" />
    <!-- Open Graph -->
    <meta property="og:title" content="CV | Manuel Martinez Garcia" />
    <meta property="og:description" content="Resume of Manuel Martinez Garcia, UC Berkeley IEOR student with experience in transportation engineering, operations research, data analysis, and research." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://manpazito.github.io/cv/" />
    <meta property="og:image" content="https://manpazito.github.io/assets/img/me.jpg" />
    <link rel="icon" type="image/png" href="/assets/img/icons/manpazito_icon.png" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  </head>

  <body class="cv-page" data-page="cv">
    <div id="page">
      <aside id="sidebar"></aside>

      <main id="content">
        <div class="intro-section header-offset">
          <h1 class="header-title">My Resume</h1>
        </div>

        <div id="main-content">
          <div class="cv-controls">
            <button id="download-btn" class="btn btn-primary">📄 Download Resume (PDF)</button>
          </div>

          <div id="pdf-viewer-container" class="pdf-viewer-container">
            <div id="pdf-canvas-wrapper">
              <canvas id="pdf-canvas"></canvas>
            </div>
            <div class="pdf-navigation">
              <button id="prev-page" class="pdf-nav-btn">← Previous</button>
              <span id="page-info"
                >Page <span id="current-page">1</span> of <span id="total-pages">1</span></span
              >
              <button id="next-page" class="pdf-nav-btn">Next →</button>
            </div>
          </div>
        </div>

        <div id="footer"></div>
      </main>
    </div>

    <script>
      // PDF.js setup
      pdfjsLib
        .getDocument('/assets/cv/ManuelMartinezGarciaResume2026.pdf')
        .promise.then(function (pdf) {
          let currentPage = 1;
          const totalPages = pdf.numPages;

          // Update total pages display
          document.getElementById('total-pages').textContent = totalPages;

          function renderPage(pageNum) {
            pdf.getPage(pageNum).then(function (page) {
              const scale = window.innerWidth < 768 ? 2 : 3;
              const viewport = page.getViewport({ scale: scale });
              const canvas = document.getElementById('pdf-canvas');
              const context = canvas.getContext('2d');

              canvas.width = viewport.width;
              canvas.height = viewport.height;

              const renderContext = {
                canvasContext: context,
                viewport: viewport,
              };

              page.render(renderContext);
              document.getElementById('current-page').textContent = pageNum;
            });
          }

          // Initial render
          renderPage(currentPage);

          // Navigation buttons
          document.getElementById('prev-page').addEventListener('click', function () {
            if (currentPage > 1) {
              currentPage--;
              renderPage(currentPage);
            }
          });

          document.getElementById('next-page').addEventListener('click', function () {
            if (currentPage < totalPages) {
              currentPage++;
              renderPage(currentPage);
            }
          });

          // Disable/enable buttons based on page
          function updateNavButtons() {
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage === totalPages;
          }
          updateNavButtons();
        })
        .catch(function (error) {
          console.error('Error loading PDF:', error);
          document.getElementById('pdf-viewer-container').innerHTML =
            '<p style="color: red;">Error loading PDF. Please try downloading directly.</p>';
        });

      // Download button
      document.getElementById('download-btn').addEventListener('click', function () {
        const link = document.createElement('a');
        link.href = '/assets/cv/ManuelMartinezGarciaResume2026.pdf';
        link.download = 'ManuelMartinezGarcia_Resume.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    </script>

    <script defer src="/assets/js/layout/shell.js"></script>
  </body>
</html>
