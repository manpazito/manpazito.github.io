<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <meta name="description" content="{{PAGE_DESCRIPTION}}" />
    <meta name="author" content="Manuel Martinez Garcia" />
    <meta property="og:title" content="{{PAGE_TITLE}}" />
    <meta property="og:description" content="{{PAGE_DESCRIPTION}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    <meta property="og:image" content="https://manpazito.github.io/assets/img/me.jpg" />
    <link rel="icon" type="image/png" href="/assets/img/icons/manpazito_icon.png" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  </head>

  <body class="{{BODY_CLASSES}}" data-page="{{NAV_KEY}}">
    <div id="page">
      <aside id="sidebar"></aside>

      <main id="content">
        <div class="intro-section header-offset">
          <h1 class="header-title">{{PAGE_HEADING}}</h1>
        </div>

        <div id="main-content">
          {{PAGE_CONTENT}}
        </div>

        <div id="footer"></div>
      </main>
    </div>

    <script defer src="/assets/js/config/site-config.js"></script>
    <script defer src="/assets/js/utils/nav-lottie.js"></script>
    <script defer src="/assets/js/layout/shell.js"></script>
    {{PAGE_SCRIPT}}
  </body>
</html>
